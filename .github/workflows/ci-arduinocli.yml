##############################################################################
#
# File: ci-arduinocli.yml
#
# Function:
#   YAML file specifying how to do continuous integration for Arduino-LMIC
#   (using arduino-cli)
#
##############################################################################

# the name that appears in the GitHub UI, the badge, etc
name: Arduino CI

# global environment
env:
  MCCI_CI_LIBRARY:  arduino-lmic

# specify the events that trigger runs.
on:
  # pull requests (default settings)
  pull_request:
  # pushes (default settings)
  push:
  # repository operations
  repository_dispatch:
  schedule:
    # do a build once a week at 06:07Z Sunday
    - cron: '7 6 * * 0'
  
# what to do:
jobs:
  
  # define a job named "arduinocli"
  arduinocli:
    # select a target OS
    runs-on:  ubuntu-latest
    name: ${{ matrix.arch }}

    strategy:
      fail-fast: false
      matrix:
        arch: [samd, stm32, esp32]
        # AVR is built separately as a Mega 2560 (see arduinocli_avr_mega
        # below). Upstream's wrap script hardcodes feather32u4 for AVR
        # and 32 KB flash is no longer enough for the LMIC core plus a
        # full bandplan, so we drive arduino-cli directly on Mega 2560.

    # step-by-step
    steps:
      # check out this repo as {root}/arduino-lmic
      - uses: actions/checkout@v2
        name: Check out the repo
        with:
          path: libraries/${{ env.MCCI_CI_LIBRARY }}

      - uses: actions/checkout@v2
        name: Set up mcci-catena-ci
        with:
          repository: mcci-catena/mcci-catena-ci
          path: mcci-catena-ci

      - name: "Get library: Adafruit_Sensor"
        uses: actions/checkout@v2
        with:
          repository: adafruit/Adafruit_Sensor
          path: libraries/Adafruit_Sensor

      - name: "Get library: DHT-sensor-library"
        uses: actions/checkout@v2
        with:
          repository: adafruit/DHT-sensor-library
          path: libraries/DHT-sensor-library

      - name: "Get library: Time"
        uses: actions/checkout@v2
        with:
          repository: PaulStoffregen/Time
          path: libraries/Time

      - name: Set up to build
        run: bash mcci-catena-ci/setup.sh -l libraries/${{ env.MCCI_CI_LIBRARY }} -a ${{ matrix.arch }}

      - name: Display structure of checkout
        run: tree -d $(realpath .)

      - name: Compile examples
        run: bash mcci-catena-ci/arduino-lmic-regress-wrap.sh -l libraries/${{env.MCCI_CI_LIBRARY}} -a ${{ matrix.arch }}

  # define a job for the AVR Mega 2560 build. Upstream's wrap script
  # hardcodes feather32u4 for the AVR matrix entry, so we drive
  # arduino-cli directly to target the Mega 2560 (256 KB flash).
  arduinocli_avr_mega:
    runs-on: ubuntu-latest
    name: avr-mega2560

    steps:
      - uses: actions/checkout@v4
        name: Check out the repo
        with:
          path: libraries/${{ env.MCCI_CI_LIBRARY }}

      - name: "Get library: Adafruit_Sensor"
        uses: actions/checkout@v4
        with:
          repository: adafruit/Adafruit_Sensor
          path: libraries/Adafruit_Sensor

      - name: "Get library: DHT-sensor-library"
        uses: actions/checkout@v4
        with:
          repository: adafruit/DHT-sensor-library
          path: libraries/DHT-sensor-library

      - name: "Get library: Time"
        uses: actions/checkout@v4
        with:
          repository: PaulStoffregen/Time
          path: libraries/Time

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR="$HOME/.local/bin" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install arduino:avr core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Compile examples for Mega 2560
        run: bash libraries/${{ env.MCCI_CI_LIBRARY }}/ci/build-avr-mega2560.sh libraries/${{ env.MCCI_CI_LIBRARY }}

### end of file ###
